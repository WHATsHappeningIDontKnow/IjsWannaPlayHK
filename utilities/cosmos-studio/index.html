<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestrium Online | Cosmos Studio (Code Editor)</title>
    <link rel="icon" type="image/x-icon" href="favicon.png?login.live.com">
    <style>
        :root {
            --bg-editor: #0d1117;
            --bg-sidebar: #161b22;
            --bg-status: #21262d;
            --border: #30363d;
            --accent: #58a6ff;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            
            --hl-keyword: #d2a8ff;
            --hl-string: #a5d6ff;
            --hl-tag: #7ee787;
            --hl-func: #d29922;
            --hl-attr: #ff7b72;
            --hl-comm: #8b949e;
            
            --warning: #d29922;
            --success: #3fb950;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            margin: 0; 
            font-family: "Segoe UI", system-ui, sans-serif;
            background-color: var(--bg-editor); 
            color: var(--text-main);
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border); height: 38px; font-size: 11px;
            font-weight: 600; color: var(--text-muted);
        }

        .header-actions { display: flex; gap: 12px; align-items: center; }
        .btn-save {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-save:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--text-muted);
            color: white;
        }

        .btn-save:active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            transform: translateY(1px);
        }

        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        #sidebar { 
            width: 260px; min-width: 260px; background: var(--bg-sidebar); 
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            transition: background 0.2s;
        }
        #sidebar.dragover { background: rgba(88, 166, 255, 0.05); border-right: 1px solid var(--accent); }

        .sidebar-header { 
            padding: 12px 16px; font-size: 11px; font-weight: 800; color: var(--text-muted); 
            display: flex; justify-content: space-between; text-transform: uppercase;
        }
        .sidebar-header button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; }
        .sidebar-header button:hover { color: var(--accent); }

        .file-item { 
            padding: 8px 16px; font-size: 13px; cursor: pointer; display: flex; 
            align-items: center; gap: 10px; border-left: 2px solid transparent;
            position: relative;
        }
        .file-item:hover { background: rgba(139, 148, 158, 0.1); }
        .file-item.active { background: #21262d; border-left: 2px solid var(--accent); color: white; }

        .file-item-dots {
            margin-left: auto; padding: 0 8px; color: var(--text-muted); font-size: 18px; visibility: hidden; border-radius: 4px;
        }
        .file-item:hover .file-item-dots { visibility: visible; }
        .file-item-dots:hover { background: var(--bg-status); color: white; }

        #tab-bar { display: flex; background: var(--bg-sidebar); height: 35px; overflow-x: auto; border-bottom: 1px solid var(--border); }
        .tab {
            display: flex; align-items: center; padding: 0 12px; height: 100%; font-size: 12px;
            color: var(--text-muted); background: var(--bg-sidebar); border-right: 1px solid var(--border);
            cursor: pointer; min-width: 120px; max-width: 200px;
        }
        .tab.active { background: var(--bg-editor); color: var(--text-main); border-bottom: 1px solid var(--accent); }
        .tab-close { margin-left: auto; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
        .tab-close:hover { color: var(--hl-attr); }

        .icon { width: 16px; text-align: center; font-family: monospace; font-size: 9px; font-weight: bold; }
        .icon-html { color: #e34f26; }
        .icon-css { color: #58a6ff; }
        .icon-js { color: #f7df1e; }
        .icon-txt { color: #8b949e; }
        .icon-json { color: #d29922; }

        #editor-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .editor-container { display: flex; flex: 1; position: relative; overflow: hidden; }

        #gutter { 
            width: 50px; padding: 20px 0; text-align: right; color: #4b535d; 
            font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.5; 
            border-right: 1px solid var(--border); overflow: hidden; flex-shrink: 0;
            background: var(--bg-editor);
        }

        .editor-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; position: relative; }

        .editor-wrap { 
            display: grid; 
            width: 100%; 
            position: relative; 
        }

        #editing, #highlighting { 
            grid-area: 1 / 1;
            margin: 0; 
            padding: 20px; 
            border: 0; 
            font-family: 'Consolas', monospace; 
            font-size: 14px; 
            line-height: 1.5; 
            tab-size: 4; 
            white-space: pre-wrap; 
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        #editing { 
            z-index: 1; 
            color: transparent; 
            background: transparent; 
            caret-color: #fff; 
            resize: none; 
            width: 100%;
            height: 100%;
            overflow: hidden;
            user-select: text !important; 
            -webkit-user-select: text !important;
        }

        #highlighting { 
            z-index: 0; 
            pointer-events: none; 
            color: var(--text-main);
            width: 100%;
        }

        .hl-key  { color: var(--hl-keyword); }
        .hl-str  { color: var(--hl-string); }
        .hl-tag  { color: var(--hl-tag); }
        .hl-func { color: var(--hl-func); }
        .hl-attr { color: var(--hl-attr); }
        .hl-comm { color: var(--hl-comm); font-style: italic; }

        #context-menu { 
            display: none; position: fixed; background: #161b22; 
            border: 1px solid var(--border); border-radius: 8px; z-index: 2000; 
            width: 200px; padding: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .menu-item { 
            padding: 8px 10px; font-size: 12px; cursor: pointer; border-radius: 4px;
            display: flex; align-items: center; gap: 10px; color: var(--text-main);
        }
        .menu-item:hover { background: var(--accent); color: white; }
        .menu-item svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 3000; align-items: flex-start; justify-content: center; padding-top: 100px; }
        .modal { background: #21262d; border: 1px solid var(--border); padding: 24px; border-radius: 10px; width: 400px; }
        .modal-types-info { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: block; }
        .modal input { 
            background: var(--bg-editor); border: 1px solid var(--border); color: white; padding: 10px; width: 100%; border-radius: 4px; margin: 15px 0; 
            user-select: text !important; -webkit-user-select: text !important;
        }
        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-btns button { padding: 8px 16px; cursor: pointer; border-radius: 4px; border: 1px solid var(--border); background: #30363d; color: white; }

        footer { height: 24px; background: var(--bg-status); color: var(--text-muted); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-size: 11px; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 8px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--accent)"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>
            COSMOS STUDIO // LIGHTWEIGHT IDE
        </div>
        <div class="header-actions">
            <div id="save-status" style="font-size: 9px; color: var(--text-muted); text-transform: uppercase;">Ready</div>
            <button class="btn-save" onclick="saveToLocal()">SAVE PROJECT</button>
        </div>
    </header>

    <div class="main-container">
        <aside id="sidebar">
            <div class="sidebar-header">EXPLORER <button onclick="prepCreate()">+</button></div>
            <div id="fileList"></div>
        </aside>

        <section id="editor-section">
            <div id="tab-bar"></div>
            <div class="editor-container">
                <div id="gutter"></div>
                <div class="editor-scroll" id="scroll" onscroll="sync()">
                    <div class="editor-wrap" id="wrap">
                        <textarea id="editing" spellcheck="false" oninput="handleInput(this.value)"></textarea>
                        <pre id="highlighting"><code id="hl-content"></code></pre>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer>
        <div id="status-left">Ready. Valid formats: .html, .css, .js, .txt, .json</div>
        <div id="auto-save-timer">Sync: 30s</div>
    </footer>

    <div id="context-menu">
        <div class="menu-item" id="menu-run" onclick="runPreview()">
            <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2 2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg> Preview HTML
        </div>
        <div class="menu-item" onclick="prepRename()">
            <svg viewBox="0 0 24 24"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg> Rename
        </div>
        <div class="menu-item" onclick="duplicateFile()">
            <svg viewBox="0 0 24 24"><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/><rect x="8" y="8" width="13" height="13" rx="2" ry="2"/></svg> Duplicate
        </div>
        <div class="menu-item" id="menu-json" onclick="beautifyJSON()">
            <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg> Beautify JSON
        </div>
        <div class="menu-item" onclick="downloadFile()">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Download
        </div>
        <div class="menu-item" id="menu-del" style="color:#f85149" onclick="deleteFile()">
            <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Delete
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3 id="modal-title" style="margin:0; font-size:14px; margin-bottom: 8px;">New File</h3>
            <span class="modal-types-info">Allowed: .html, .css, .js, .txt, .json</span>
            <input type="text" id="modal-input" placeholder="filename.filetype">
            <div class="modal-btns">
                <button onclick="closeModal()">Cancel</button>
                <button id="modal-confirm" style="background:var(--accent); border:none;">Create</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'cosmos_studio_project';
        const VALID_EXT = ['html', 'css', 'js', 'txt', 'json'];

        let files = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
            {
                name: 'README.txt',
                type: 'txt',
                content: `
        WELCOME TO COSMOS STUDIO
        ====================================
        Your lightweight, browser-based coding environment.

        1. GETTING STARTED
        - Use the [+] button in the sidebar to create new files.
        - Drag & Drop files from your computer directly into the sidebar to import them.
        - Your work is automatically synced to your browser's LocalStorage every 30 seconds.

        2. SUPPORTED FILETYPES
        - .html  (Full syntax highlighting + Preview mode)
        - .css   (Full syntax highlighting)
        - .js    (Full syntax highlighting)
        - .json  (Syntax highlighting + Beautifier)
        - .txt   (Plain text editing)

        3. AVAILABLE FUNCTIONS (Right-click a file in the sidebar)
        - PREVIEW HTML: Opens your HTML code in a new window to see it live.
        - BEAUTIFY JSON: Instantly formats messy JSON strings into readable code.
        - RENAME: Safely change filenames (prevents duplicates and invalid types).
        - DUPLICATE: Creates a copy of your file instantly.
        - DOWNLOAD: Saves the file to your physical hard drive.
        - DELETE: Removes the file from your workspace.

        4. PRO TIPS
        - Tabs: You can open multiple files; use the tab bar to switch between them.
        - Persistence: Even if you refresh the page, your files will stay here!
        
        If you notice any bugs or have suggestions for new features, please report them to the issues page on the Celestrium Online Github Repository (see the about section of Celestrium Online for the link).

        Happy Coding!
        -- The Celestrium Online Team`
            }
        ];

        let openFiles = [0], activeIdx = 0, rightClickIdx = 0, countdown = 30;
        const textarea = document.getElementById('editing');
        const hl = document.getElementById('hl-content');
        const sidebar = document.getElementById('sidebar');

        // HELPER: Strict duplication and format check
        function validateFileName(name, excludeIdx = -1) {
            const ext = name.split('.').pop().toLowerCase();
            if (!VALID_EXT.includes(ext)) {
                alert(`Invalid file type: .${ext}\nOnly ${VALID_EXT.join(', ')} are allowed.`);
                return false;
            }
            const isDuplicate = files.some((f, i) => f.name.toLowerCase() === name.toLowerCase() && i !== excludeIdx);
            if (isDuplicate) {
                alert(`A file named "${name}" already exists in the workspace.`);
                return false;
            }
            return true;
        }

        sidebar.ondragover = (e) => { e.preventDefault(); sidebar.classList.add('dragover'); };
        sidebar.ondragleave = () => sidebar.classList.remove('dragover');
        sidebar.ondrop = (e) => {
            e.preventDefault();
            sidebar.classList.remove('dragover');
            Array.from(e.dataTransfer.files).forEach(file => {
                if(!validateFileName(file.name)) return;

                const reader = new FileReader();
                const ext = file.name.split('.').pop().toLowerCase();
                reader.onload = (ev) => {
                    files.push({ name: file.name, type: ext, content: ev.target.result });
                    openFile(files.length - 1);
                };
                reader.readAsText(file);
            });
        };

        function saveToLocal(isAuto = false) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
            const status = document.getElementById('save-status');
            if(status) {
                status.innerText = isAuto ? "Auto-Saved" : "Project Saved";
                setTimeout(() => status.innerText = "Synced", 2000);
            }
        }

        setInterval(() => {
            if (document.visibilityState === 'visible') {
                countdown--;
                if (countdown <= 0) { saveToLocal(true); countdown = 30; }
                const timer = document.getElementById('auto-save-timer');
                if(timer) timer.innerText = `Sync: ${countdown}s`;
            }
        }, 1000);

        function triggerContextMenu(e, index) {
            e.preventDefault(); e.stopPropagation();
            rightClickIdx = index;
            document.getElementById('menu-run').style.display = files[rightClickIdx].type === 'html' ? 'flex' : 'none';
            document.getElementById('menu-json').style.display = files[rightClickIdx].type === 'json' ? 'flex' : 'none';
            document.getElementById('menu-del').style.display = files.length > 1 ? 'flex' : 'none';
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
        }

        window.addEventListener('contextmenu', e => {
            const item = e.target.closest('.file-item');
            if (item) triggerContextMenu(e, parseInt(item.dataset.index));
        });

        window.addEventListener('click', () => { document.getElementById('context-menu').style.display = 'none'; });

        function getIcon(type) {
            const icons = { html: '&lt;&gt;', css: '#', js: 'JS', txt: 'TXT', json: '{ }' };
            return `<span class="icon icon-${type}">${icons[type] || '•'}</span>`;
        }

        function openFile(idx) {
            if (!openFiles.includes(idx)) openFiles.push(idx);
            activeIdx = idx; render();
        }

        function closeTab(e, idx) {
            e.stopPropagation();
            openFiles = openFiles.filter(i => i !== idx);
            if (activeIdx === idx) activeIdx = openFiles.length > 0 ? openFiles[0] : -1;
            render();
        }

        function prepCreate() {
            const input = document.getElementById('modal-input');
            input.value = ""; // FIXED: Clears input so filler text is visible
            document.getElementById('modal-title').innerText = "New File";
            document.getElementById('modal-confirm').innerText = "Create";
            document.getElementById('modal-overlay').style.display = 'flex';
            input.focus();
            document.getElementById('modal-confirm').onclick = () => {
                const val = input.value.trim();
                if (!validateFileName(val)) return; // FIXED: Added strict duplication/format check
                
                const ext = val.split('.').pop().toLowerCase();
                files.push({ name: val, type: ext, content: '' });
                openFile(files.length - 1); closeModal(); saveToLocal();
            };
        }

        function prepRename() {
            const f = files[rightClickIdx];
            const input = document.getElementById('modal-input');
            document.getElementById('modal-title').innerText = "Rename File";
            document.getElementById('modal-confirm').innerText = "Rename";
            input.value = f.name;
            document.getElementById('modal-overlay').style.display = 'flex';
            input.focus();
            document.getElementById('modal-confirm').onclick = () => {
                const val = input.value.trim();
                if (!validateFileName(val, rightClickIdx)) return; // FIXED: Added strict duplication/format check
                
                const ext = val.split('.').pop().toLowerCase();
                files[rightClickIdx].name = val; files[rightClickIdx].type = ext;
                render(); closeModal(); saveToLocal();
            };
        }

        function duplicateFile() {
            const original = files[rightClickIdx];
            let newName = "copy_" + original.name;
            let counter = 1;
            // Loop until we find a name that isn't a duplicate
            while(files.some(f => f.name.toLowerCase() === newName.toLowerCase())) {
                newName = `copy${counter}_` + original.name;
                counter++;
            }
            files.push({ name: newName, type: original.type, content: original.content });
            openFile(files.length - 1); saveToLocal();
        }

        function deleteFile() {
            if (files.length > 1) {
                openFiles = openFiles.filter(i => i !== rightClickIdx).map(i => i > rightClickIdx ? i - 1 : i);
                files.splice(rightClickIdx, 1);
                activeIdx = Math.min(activeIdx, files.length - 1);
                render(); saveToLocal();
            }
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function downloadFile() {
            const f = files[rightClickIdx];
            const blob = new Blob([f.content], {type: 'text/plain'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = f.name; a.click();
        }

        function beautifyJSON() {
            try {
                const obj = JSON.parse(files[activeIdx].content);
                files[activeIdx].content = JSON.stringify(obj, null, 4);
                render();
            } catch(e) { alert("Invalid JSON"); }
        }

        function runPreview() {
            const f = files[rightClickIdx];
            const win = window.open('about:blank', '_blank');
            win.document.write(f.content); win.document.close();
        }

        function render() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            files.forEach((f, i) => {
                const div = document.createElement('div');
                div.className = `file-item ${i === activeIdx ? 'active' : ''}`;
                div.dataset.index = i;
                div.onclick = () => openFile(i);
                div.innerHTML = `${getIcon(f.type)} <span>${f.name}</span> <span class="file-item-dots" onclick="triggerContextMenu(event, ${i})">⋮</span>`;
                list.appendChild(div);
            });

            const tabBar = document.getElementById('tab-bar');
            tabBar.innerHTML = '';
            openFiles.forEach(idx => {
                const f = files[idx];
                const tab = document.createElement('div');
                tab.className = `tab ${idx === activeIdx ? 'active' : ''}`;
                tab.onclick = () => { activeIdx = idx; render(); };
                tab.innerHTML = `${getIcon(f.type)} <span style="margin-left:8px">${f.name}</span> <span class="tab-close" onclick="closeTab(event, ${idx})">×</span>`;
                tabBar.appendChild(tab);
            });

            if (activeIdx !== -1 && files[activeIdx]) { 
                textarea.value = files[activeIdx].content; 
                handleInput(textarea.value); 
            }
        }

        /* --- HIGHLIGHTING ENGINE --- */

        function highlightJS(code) {
            return code
                .replace(/\b(const|let|var|function|return|if|else|for|while|class|export|import|true|false|null|async|await|new|this)\b/g, '<span class="hl-key">$1</span>')
                .replace(/(?<!=)(?<!["'])\b(\d+(?:\.\d+)?)\b/g, '<span class="hl-func">$1</span>')
                .replace(/\b(\w+)(?=\s*\()/g, '<span class="hl-func">$1</span>');
        }

        function highlightCSS(code) {
            return code
                .replace(/#([a-fA-F0-9]{6}|[a-fA-F0-9]{3})\b/g, '<span class="hl-func">#$1</span>')
                .replace(/\b([a-z-]+)(?=\s*:)/gi, '<span class="hl-attr">$1</span>')
                .replace(/\b(\d+(?:\.\d+)?)(px|rem|em|vh|vw|%|ms|s|deg)?\b/gi, (m, num, unit) => {
                    let res = `<span class="hl-func">${num}</span>`;
                    if (unit) res += `<span class="hl-key">${unit}</span>`;
                    return res;
                })
                .replace(/(?<![0-9a-zA-Z>])([.#][a-zA-Z0-9_-]+)/g, m => `<span class="hl-tag">${m}</span>`)
                .replace(/\b(html|body|main|section|aside|header|footer|div|p|h[1-6]|span|a|ul|li)\b(?=\s*\{)/gi, '<span class="hl-tag">$1</span>');
        }

        function handleInput(val) {
            if (activeIdx === -1) return;
            files[activeIdx].content = val;

            let h = val.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const type = files[activeIdx].type;
            const protections = [];

            h = h.replace(/\/\*[\s\S]*?\*\//g, m => { protections.push(`<span class="hl-comm">${m}</span>`); return `[[PROT${protections.length - 1}]]`; });
            h = h.replace(/(?<![:"'])\/\/.*/g, m => { protections.push(`<span class="hl-comm">${m}</span>`); return `[[PROT${protections.length - 1}]]`; });
            h = h.replace(/(['"|`])(?:(?!\1).|\\\1)*\1/g, m => { protections.push(`<span class="hl-str">${m}</span>`); return `[[PROT${protections.length - 1}]]`; });

            if (type === 'js' || type === 'json') h = highlightJS(h);
            else if (type === 'css') h = highlightCSS(h);
            else if (type === 'html') {
                const blocks = [];
                h = h.replace(/(&lt;style&gt;)([\s\S]*?)(&lt;\/style&gt;)/gi, (m, open, content, close) => {
                    blocks.push(`<span class="hl-tag">${open}</span>${highlightCSS(content)}<span class="hl-tag">${close}</span>`);
                    return `[[BLOCK${blocks.length - 1}]]`;
                });
                h = h.replace(/(&lt;script&gt;)([\s\S]*?)(&lt;\/script&gt;)/gi, (m, open, content, close) => {
                    blocks.push(`<span class="hl-tag">${open}</span>${highlightJS(content)}<span class="hl-tag">${close}</span>`);
                    return `[[BLOCK${blocks.length - 1}]]`;
                });
                h = h.replace(/(&lt;\/?[a-z1-6]+)([\s\S]*?)(&gt;)/gi, (m, start, mid, end) => {
                    const midAttr = mid.replace(/\b([a-z-]+)(?==)/gi, '<span class="hl-attr">$1</span>');
                    return `<span class="hl-tag">${start}</span><span style="color:var(--text-muted)">${midAttr}</span><span class="hl-tag">${end}</span>`;
                });
                h = h.replace(/\[\[BLOCK(\d+)\]\]/g, (m, i) => blocks[i]);
            }

            h = h.replace(/\[\[PROT(\d+)\]\]/g, (m, i) => protections[i]);
            hl.innerHTML = h + "\n";
            
            updateGutter();
        }

        function updateGutter() {
            const lines = textarea.value.split('\n');
            const gutter = document.getElementById('gutter');
            
            const measure = document.createElement('div');
            measure.style.cssText = `
                position: absolute; visibility: hidden; width: ${textarea.clientWidth - 40}px;
                font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.5;
                white-space: pre-wrap; word-wrap: break-word; padding: 0;
            `;
            document.body.appendChild(measure);

            let gutterHTML = "";
            lines.forEach((lineText, i) => {
                measure.textContent = lineText || " ";
                const height = measure.clientHeight;
                const lineCount = Math.round(height / 21);
                
                gutterHTML += `<span>${i + 1}</span><br>`;
                for(let j = 1; j < lineCount; j++) {
                    gutterHTML += `<span style="visibility:hidden">.</span><br>`;
                }
            });

            gutter.innerHTML = gutterHTML;
            document.body.removeChild(measure);
            sync();
        }

        function sync() { 
            const scroller = document.getElementById('scroll');
            document.getElementById('gutter').scrollTop = scroller.scrollTop; 
        }
        
        window.addEventListener('resize', updateGutter);
        render();
    </script>
</body>
</html>
